<!DOCTYPE html>
<html>
<head>
    <title>Backend Connection Test</title>
</head>
<body>
    <h1>Testing Backend Connection</h1>
    <button onclick="testConnection()">Test Connection to localhost:3000</button>
    <div id="result"></div>

    <script>
        async function testConnection() {
            const result = document.getElementById('result');
            result.innerHTML = 'Testing...';
            
            try {
                const response = await fetch('http://localhost:3000/interview/start', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        resume: 'test',
                        jobDescription: 'test',
                        level: 'junior',
                        questionCount: 1
                    })
                });
                
                if (response.ok) {
                    const data = await response.json();
                    result.innerHTML = `<p style="color: green;">✓ Backend is running!</p><pre>${JSON.stringify(data, null, 2)}</pre>`;
                } else {
                    result.innerHTML = `<p style="color: orange;">Backend responded with status: ${response.status}</p>`;
                }
            } catch (err) {
                result.innerHTML = `<p style="color: red;">✗ Backend NOT running or unreachable</p><p>Error: ${err.message}</p><p><strong>Make sure your backend server is running on http://localhost:3000</strong></p>`;
            }
        }
    </script>
</body>
</html>
